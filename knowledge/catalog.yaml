# Каталог школы — единый источник правды.
# Меняйте цены и программы только здесь, затем запустите:
#   python scripts/build_knowledge.py
#
# Подробная инструкция: knowledge/README.md

school:
  name: "Финансист"
  tagline: >
    Онлайн-школа практического финансового образования для взрослых.
    Помогаем выстроить личные финансы, научиться копить и осознанно инвестировать.
  contacts:
    email: support@finansist-school.ru
    manager_hint: "Напишите «менеджер» в Telegram-боте школы"

installment:
  min_package_price_rub: 10000
  months: 3
  note: >
    Для пакетов от 10000 рублей доступна беспроцентная рассрочка на 3 месяца
    через партнёрские платёжные сервисы. Точные условия уточняйте у менеджера
    на момент оплаты.

programs:
  - id: financial-base
    level: "Новичок в финансах"
    title: "Стартовый онлайн-курс «Финансовая база с нуля»"
    short_title: "Финансовая база с нуля"
    price_rub: 2900
    audience: >
      У кого нет устойчивой дельты и финансовой системы, но вы на старте пути
      к порядку в деньгах
    result: >
      После прохождения вы начнёте считать доходы и расходы, увидите, куда уходят
      деньги, и заложите основу первой финансовой подушки
    summary: "Учёт доходов и расходов, основа финансовой подушки"
    explanation: >
      Сейчас важнее всего навести порядок в деньгах: понять доходы и расходы
      и заложить основу финансовой подушки.
    duration: "3 недели, 6 уроков"
    format: "видеоуроки 15–25 минут, рабочая тетрадь, шаблоны таблиц учёта"
    includes: >
      доступ к урокам на 6 месяцев, чек-листы, шаблон учёта доходов и расходов,
      2 групповых разбора с куратором, сертификат о прохождении
    modules:
      - "Неделя 1: диагностика текущей ситуации, карта денежных потоков, старт учёта"
      - "Неделя 2: категории расходов, «утечки» бюджета, привычка еженедельного обзора"
      - "Неделя 3: финансовая подушка — сколько нужно, как копить с нуля, первые автоматические накопления"

  - id: budget-delta
    level: "Финансовый базовый уровень"
    title: "Практикум «Личный бюджет и первая дельта»"
    short_title: "Личный бюджет и первая дельта"
    price_rub: 5000
    audience: >
      У кого есть базовое понимание финансов, но ещё не выстроена привычка
      регулярно откладывать и накапливать дельту
    result: >
      После практикума у вас будет простой рабочий бюджет, настроенное
      автоматическое откладывание и первая стабильная дельта без жёсткой экономии
    summary: "Рабочий бюджет и первая стабильная дельта"
    explanation: >
      У вас уже есть базовое понимание финансов, но пока не выстроена стабильная
      привычка копить — практикум поможет настроить бюджет и первую дельту.
    duration: "4 недели, 8 практических модулей"
    format: "короткие видео + еженедельные задания с обратной связью"
    includes: >
      доступ на 9 месяцев, калькулятор дельты, шаблон бюджета на 12 месяцев,
      3 проверки домашних заданий куратором, чат группы потока, сертификат
    modules:
      - "Модуль 1: доходы и обязательные расходы"
      - "Модуль 2: гибкие траты и лимиты без жёсткой экономии"
      - "Модуль 3: дельта — формула, целевой процент, автоплатежи"
      - "Модуль 4: антикризисный мини-бюджет и пересмотр плана раз в месяц"
      - "Модули 5–8: закрепление, типовые ошибки, сценарии «нестабильный доход», итоговый бюджет на год"

  - id: first-investments
    level: "Растущий инвестор"
    title: "Курс «Первые инвестиции: от дельты к капиталу»"
    short_title: "Первые инвестиции"
    price_rub: 10000
    audience: >
      У кого уже есть небольшая дельта и накопления, и вы готовы аккуратно
      переходить от простого сбережения к осознанным инвестициям
    result: >
      После курса вы поймёте базовые инвестиционные инструменты, соберёте свой
      первый портфель и сможете направлять дельту на рост капитала
    summary: "Базовые инструменты и первый портфель"
    explanation: >
      У вас уже есть накопления и интерес к инвестициям — курс поможет освоить
      базовые инструменты и собрать первый портфель.
    duration: "6 недель, 10 модулей"
    format: "видеолекции, разбор кейсов, практикум по сборке учебного портфеля"
    includes: >
      доступ на 12 месяцев, гайд по брокерским счетам (без рекомендаций конкретных
      бумаг), чек-лист рисков, 4 разбора домашних заданий, 2 живых Q&A-сессии
      с преподавателем, сертификат
    modules:
      - "Модуль 1: зачем инвестировать и чем инвестиции отличаются от спекуляций"
      - "Модуль 2: риск, доходность, горизонт, инфляция"
      - "Модуль 3: банковские вклады, накопительные счета, облигации (обзорно)"
      - "Модуль 4: ETF и диверсификация"
      - "Модуль 5: акции как часть портфеля (образовательный обзор)"
      - "Модуль 6: налоги и базовая отчётность для частного инвестора"
      - "Модули 7–10: сборка учебного портфеля, правила пополнения, ребалансировка, типичные ошибки новичков"

  - id: capital-goals
    level: "Осознанный инвестор с капиталом"
    title: "Персональная стратегия «Капитал под цели»"
    short_title: "Капитал под цели"
    price_rub: 15000
    audience: >
      У кого уже есть капитал и понимание финансов, и сейчас важная задача —
      структурировать вложения под долгосрочные цели
    result: >
      После работы над стратегией у вас будет чёткий план распределения капитала,
      понятная структура портфеля и правила пересмотра вложений под ваши цели
    summary: "Стратегия распределения капитала под цели"
    explanation: >
      У вас уже есть капитал и опыт — сейчас важно структурировать вложения
      под долгосрочные цели и выстроить понятную стратегию.
    duration: "8 недель, индивидуальный трек + 6 созвонов"
    format: "персональные задания, шаблон стратегии, сопровождение наставника"
    includes: >
      доступ на 12 месяцев, индивидуальный план обучения, 6 консультаций по 45 минут
      (образовательный формат, не инвестиционный совет), шаблон «капитал под цели»,
      итоговый документ стратегии, сертификат
    modules:
      - "Блок 1: цели на 1, 3 и 5+ лет, приоритизация"
      - "Блок 2: распределение капитала по «корзинам» целей"
      - "Блок 3: структура портфеля и правила допустимого риска"
      - "Блок 4: сценарии кризиса, паузы в инвестировании, пересмотр стратегии"
      - "Блок 5: итоговый документ «моя стратегия» и план ежеквартального обзора"

packages:
  - id: financial-fundament
    title: "Финансовый фундамент"
    program_ids: [financial-base, budget-delta]
    price_rub: 7000
    audience: >
      Тем, кто хочет пройти путь от хаоса в тратах до стабильной дельты
    access_note: "Срок доступа: по условиям каждого курса (6 и 9 месяцев соответственно)"

  - id: investor-path
    title: "Путь инвестора"
    program_ids: [budget-delta, first-investments]
    price_rub: 13000
    audience: >
      Тем, у кого уже есть база, и кто хочет перейти к первым вложениям

  - id: full-track
    title: "Полная траектория"
    program_ids: [financial-base, budget-delta, first-investments, capital-goals]
    price_rub: 28000
    audience: >
      Тем, кто хочет пройти весь путь от учёта до персональной стратегии капитала
    access_note: "Срок прохождения рекомендуемый: 6–9 месяцев"

  - id: capital-support
    title: "Капитал + сопровождение"
    program_ids: [first-investments, capital-goals]
    price_rub: 22000
    audience: >
      Тем, у кого уже есть накопления и нужен переход к структурированной
      долгосрочной стратегии
